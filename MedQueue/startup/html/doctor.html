<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MedQueue  Портал врача</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --teal:#0d9488; --teal-l:#14b8a6; --navy:#0f172a;
      --bg:#f0f4f8; --surface:#ffffff; --text:#1e293b;
      --muted:#64748b; --border:#e2e8f0;
      --radius:14px; --shadow:0 2px 14px rgba(0,0,0,.07);
    }
    [data-theme="dark"] {
      --bg:#080e1a; --surface:#111827; --text:#e2e8f0;
      --muted:#94a3b8; --border:rgba(255,255,255,.07);
      --shadow:0 2px 14px rgba(0,0,0,.35);
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
    /* TOPBAR */
    .topbar { background:linear-gradient(135deg,var(--navy) 0%,var(--teal) 100%); color:#fff; height:62px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 20px rgba(0,0,0,.25); flex-shrink:0; }
    .topbar-brand { display:flex; align-items:center; gap:10px; font-size:19px; font-weight:900; }
    .topbar-brand .sep { opacity:.45; font-weight:400; font-size:13px; }
    .topbar-right { display:flex; align-items:center; gap:16px; }
    .doctor-chip { display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.12); border-radius:100px; padding:5px 14px 5px 5px; font-size:13px; font-weight:600; }
    .doctor-chip .avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#0d9488,#14b8a6); display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; color:#fff; }
    .switch { position:relative; display:inline-block; width:40px; height:22px; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:rgba(255,255,255,.25); border-radius:22px; cursor:pointer; transition:.2s; }
    .slider::before { content:''; position:absolute; width:16px; height:16px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s; }
    .switch input:checked + .slider { background:rgba(20,184,166,.7); }
    .switch input:checked + .slider::before { transform:translateX(18px); }
    .btn-logout { border:1.5px solid rgba(255,255,255,.35); background:transparent; color:#fff; padding:7px 18px; border-radius:8px; font-size:13px; font-weight:700; cursor:pointer; transition:background .15s; font-family:'Inter',sans-serif; }
    .btn-logout:hover { background:rgba(255,255,255,.12); }
    /* BODY LAYOUT */
    .body-wrap { flex:1; display:flex; max-width:1280px; width:100%; margin:0 auto; padding:28px 20px 60px; gap:24px; }
    /* SIDEBAR */
    .sidebar { width:280px; flex-shrink:0; display:flex; flex-direction:column; gap:18px; }
    .card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    .profile-card { text-align:center; padding:28px 20px 22px; }
    .big-avatar { width:74px; height:74px; border-radius:50%; background:linear-gradient(135deg,var(--navy),var(--teal)); display:flex; align-items:center; justify-content:center; font-size:32px; color:#fff; font-weight:900; margin:0 auto 14px; box-shadow:0 4px 20px rgba(13,148,136,.35); }
    .profile-name { font-size:17px; font-weight:800; color:var(--text); margin-bottom:5px; }
    .profile-spec { display:inline-block; background:rgba(13,148,136,.12); color:var(--teal); font-size:12px; font-weight:700; padding:4px 12px; border-radius:100px; margin-bottom:6px; }
    .sidebar-stats { padding:18px 20px; display:flex; flex-direction:column; gap:12px; }
    .stats-title { font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px; }
    .stat-row { display:flex; align-items:center; justify-content:space-between; }
    .stat-label { font-size:13px; color:var(--muted); font-weight:500; }
    .stat-val { font-size:22px; font-weight:900; color:var(--teal); }
    .qi { padding:18px 20px; display:flex; flex-direction:column; gap:10px; }
    .qi-row { display:flex; align-items:flex-start; gap:10px; font-size:13px; }
    .qi-icon { font-size:16px; flex-shrink:0; margin-top:1px; }
    .qi-lbl { color:var(--muted); font-size:11px; font-weight:600; line-height:1; margin-bottom:2px; }
    .qi-val { color:var(--text); font-weight:600; }
    /* MAIN */
    .main-col { flex:1; min-width:0; display:flex; flex-direction:column; gap:20px; }
    .page-heading h1 { font-size:22px; font-weight:900; color:var(--text); }
    .page-heading .sub { font-size:13px; color:var(--muted); margin-top:2px; }
    /* FILTER BAR */
    .filter-bar { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 18px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .f-sep { width:1px; height:28px; background:var(--border); margin:0 4px; }
    .pill { padding:7px 16px; border:2px solid var(--border); border-radius:100px; background:transparent; font-size:12.5px; font-weight:700; color:var(--muted); cursor:pointer; transition:all .15s; font-family:'Inter',sans-serif; }
    .pill:hover { border-color:var(--teal); color:var(--teal); }
    .pill.active { background:var(--teal); border-color:var(--teal); color:#fff; }
    .btn-refresh { padding:7px 16px; background:rgba(13,148,136,.1); border:none; border-radius:100px; font-size:12.5px; font-weight:700; color:var(--teal); cursor:pointer; margin-left:auto; font-family:'Inter',sans-serif; transition:background .15s; }
    .btn-refresh:hover { background:rgba(13,148,136,.2); }
    /* TABLE */
    .table-card { background:var(--surface); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; }
    table { width:100%; border-collapse:collapse; }
    thead th { background:var(--bg); padding:11px 16px; font-size:11.5px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; text-align:left; border-bottom:1px solid var(--border); }
    tbody td { padding:13px 16px; font-size:14px; color:var(--text); border-bottom:1px solid var(--border); vertical-align:middle; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:rgba(13,148,136,.03); }
    .badge { display:inline-block; padding:4px 10px; border-radius:100px; font-size:11.5px; font-weight:700; white-space:nowrap; }
    .b-confirmed { background:#dcfce7; color:#166534; }
    .b-completed { background:#dbeafe; color:#1e40af; }
    .b-cancelled { background:#fee2e2; color:#991b1b; }
    [data-theme="dark"] .b-confirmed { background:rgba(22,163,74,.2); color:#86efac; }
    [data-theme="dark"] .b-completed { background:rgba(59,130,246,.2); color:#93c5fd; }
    [data-theme="dark"] .b-cancelled { background:rgba(239,68,68,.2); color:#fca5a5; }
    .act-btn { padding:5px 12px; border:none; border-radius:7px; font-size:12px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:opacity .15s; }
    .act-btn:hover { opacity:.8; }
    .act-done { background:var(--teal); color:#fff; }
    .act-cancel { background:#ef4444; color:#fff; margin-left:5px; }
    .placeholder { text-align:center; padding:64px 20px; color:var(--muted); font-size:15px; }
    .placeholder .icon { font-size:52px; margin-bottom:14px; }
    /* TOAST */
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:12px 24px; border-radius:12px; font-size:14px; font-weight:600; z-index:9999; opacity:0; pointer-events:none; transition:opacity .25s; white-space:nowrap; }
    .toast.show { opacity:1; }
    /* AI */
    #aiBubble { position:fixed; bottom:28px; right:28px; width:54px; height:54px; border-radius:50%; background:linear-gradient(135deg,var(--navy),var(--teal)); color:#fff; font-size:24px; border:none; cursor:pointer; box-shadow:0 4px 22px rgba(13,148,136,.5); z-index:9000; display:flex; align-items:center; justify-content:center; transition:transform .18s; }
    #aiBubble:hover { transform:scale(1.1); }
    #aiPanel { position:fixed; bottom:96px; right:28px; width:340px; max-height:500px; background:var(--surface); border-radius:18px; box-shadow:0 8px 40px rgba(0,0,0,.22); display:none; flex-direction:column; z-index:8999; overflow:hidden; }
    #aiPanel.open { display:flex; }
    .ai-head { background:linear-gradient(135deg,var(--navy),var(--teal)); color:#fff; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; font-size:14px; font-weight:700; }
    .ai-head button { background:rgba(255,255,255,.15); border:none; color:#fff; width:26px; height:26px; border-radius:50%; cursor:pointer; font-size:13px; }
    .ai-msgs { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; background:var(--bg); }
    .ai-msg { max-width:85%; padding:10px 13px; border-radius:14px; font-size:13.5px; line-height:1.45; }
    .ai-msg.bot { background:var(--surface); border:1px solid var(--border); align-self:flex-start; border-bottom-left-radius:4px; color:var(--text); }
    .ai-msg.user { background:linear-gradient(135deg,var(--navy),var(--teal)); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
    .ai-input-row { display:flex; gap:8px; padding:10px; background:var(--surface); border-top:1px solid var(--border); }
    .ai-input-row input { flex:1; border:1.5px solid var(--border); border-radius:10px; padding:9px 12px; font-size:13.5px; font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); outline:none; }
    .ai-input-row input:focus { border-color:var(--teal); }
    .ai-input-row button { background:var(--teal); color:#fff; border:none; border-radius:10px; padding:9px 14px; cursor:pointer; font-size:16px; }
    @media(max-width:820px) { .body-wrap{flex-direction:column;} .sidebar{width:100%;} }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-brand"> MedQueue <span class="sep">/ Портал врача</span></div>
    <div class="topbar-right">
      <label class="switch" title="Тёмная тема"><input type="checkbox" id="themeToggle" onchange="toggleTheme()"><span class="slider"></span></label>
      <div class="doctor-chip"><div class="avatar" id="avatarInitial"></div><span id="topbarName">Загрузка</span></div>
      <button class="btn-logout" onclick="logout()">Выйти</button>
    </div>
  </header>

  <div class="body-wrap" id="pageBody" style="display:none;">
    <aside class="sidebar">
      <div class="card profile-card">
        <div class="big-avatar" id="sideAvatar"></div>
        <div class="profile-name" id="sideName"></div>
        <div class="profile-spec" id="sideSpec"></div>
      </div>
      <div class="card">
        <div class="sidebar-stats">
          <div class="stats-title">Статистика</div>
          <div class="stat-row"><span class="stat-label">Сегодня</span><span class="stat-val" id="statToday"></span></div>
          <div class="stat-row"><span class="stat-label">Всего записей</span><span class="stat-val" id="statTotal"></span></div>
        </div>
      </div>
      <div class="card qi">
        <div class="qi-row"><div class="qi-icon"></div><div><div class="qi-lbl">Учреждение</div><div class="qi-val" id="qiHospital"></div></div></div>
        <div class="qi-row"><div class="qi-icon"></div><div><div class="qi-lbl">Адрес</div><div class="qi-val" id="qiAddress"></div></div></div>
        <div class="qi-row"><div class="qi-icon"></div><div><div class="qi-lbl">Кабинет</div><div class="qi-val" id="qiCabinet"></div></div></div>
        <div class="qi-row"><div class="qi-icon"></div><div><div class="qi-lbl">Часы работы</div><div class="qi-val" id="qiHours"></div></div></div>
        <div class="qi-row"><div class="qi-icon"></div><div><div class="qi-lbl">Рабочие дни</div><div class="qi-val" id="qiDays"></div></div></div>
      </div>
    </aside>
    <div class="main-col">
      <div class="page-heading"><h1>Записи пациентов</h1><div class="sub" id="todayStr"></div></div>
      <div class="filter-bar">
        <button class="pill active" id="fToday" onclick="setFilter('today')">Сегодня</button>
        <button class="pill" id="fWeek" onclick="setFilter('week')">Неделя</button>
        <button class="pill" id="fAll" onclick="setFilter('all')">Все</button>
        <div class="f-sep"></div>
        <button class="pill active" id="sAll" onclick="setStatus('')">Все статусы</button>
        <button class="pill" id="sConfirmed" onclick="setStatus('confirmed')">Подтверждённые</button>
        <button class="pill" id="sCompleted" onclick="setStatus('completed')">Завершённые</button>
        <button class="pill" id="sCancelled" onclick="setStatus('cancelled')">Отменённые</button>
        <button class="btn-refresh" onclick="loadAppointments()"> Обновить</button>
      </div>
      <div class="table-card" id="tableCard">
        <div class="placeholder"><div class="icon"></div>Загрузка</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <button id="aiBubble" onclick="toggleAi()" title="МедAI"></button>
  <div id="aiPanel">
    <div class="ai-head"><span> МедAI  помощник</span><button onclick="toggleAi()"></button></div>
    <div class="ai-msgs" id="aiMsgs"><div class="ai-msg bot">Привет! Я МедAI. Задайте вопрос о пациентах или организации приёма.</div></div>
    <div class="ai-input-row"><input id="aiInput" placeholder="Ваш вопрос" onkeydown="if(event.key==='Enter')sendAi()"><button onclick="sendAi()"></button></div>
  </div>

<script>
  (function(){
    const t=localStorage.getItem('medqueue_theme')||'light';
    if(t==='dark') document.documentElement.setAttribute('data-theme','dark');
    window.addEventListener('DOMContentLoaded',function(){
      const cb=document.getElementById('themeToggle');
      if(cb) cb.checked=(t==='dark');
    });
  })();
  function toggleTheme(){
    const d=document.getElementById('themeToggle').checked;
    document.documentElement.setAttribute('data-theme',d?'dark':'light');
    localStorage.setItem('medqueue_theme',d?'dark':'light');
  }
  const API_BASE=window.location.protocol==='file:'?(localStorage.getItem('medqueue_api_origin')||'http://127.0.0.1:8000'):window.location.origin;
  const API=`${API_BASE}/api`;
  const AUTH_KEY='medqueue_current_user';
  let activeFilter='today', activeStatus='';
  function getUser(){ return JSON.parse(localStorage.getItem(AUTH_KEY)||'null'); }
  function logout(){ localStorage.removeItem(AUTH_KEY); window.location.href='auth.html'; }
  async function apiFetch(url,opts={}){
    let user=getUser(); if(!user){logout();return null;}
    const hdrs={'Content-Type':'application/json',...(opts.headers||{})};
    if(user.access) hdrs['Authorization']=`Bearer ${user.access}`;
    let res=await fetch(url,{...opts,headers:hdrs});
    if(res.status===401){
      try{
        const rt=await fetch(`${API}/auth/token/refresh/`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({refresh:user.refresh})});
        if(rt.ok){const tk=await rt.json();user.access=tk.access;localStorage.setItem(AUTH_KEY,JSON.stringify(user));hdrs['Authorization']=`Bearer ${user.access}`;res=await fetch(url,{...opts,headers:hdrs});}
        else{logout();return null;}
      }catch{logout();return null;}
    }
    return res;
  }
  async function init(){
    const user=getUser();
    if(!user){window.location.href='auth.html?next=doctor.html';return;}
    if(user.role!=='doctor'){alert('Страница только для врачей.');window.location.href='profile.html';return;}
    const res=await apiFetch(`${API}/doctor/me/`);
    if(!res) return;
    if(!res.ok){const d=await res.json().catch(()=>({}));showToast(d.error||'Ошибка');setTimeout(logout,2000);return;}
    const d=await res.json();
    const ini=(d.name||'?').trim().split(' ').map(p=>p[0]).slice(0,2).join('').toUpperCase();
    document.getElementById('avatarInitial').textContent=ini;
    document.getElementById('topbarName').textContent=d.name;
    document.getElementById('sideAvatar').textContent=ini;
    document.getElementById('sideName').textContent=d.name;
    document.getElementById('sideSpec').textContent=d.specialty;
    document.getElementById('statToday').textContent=d.stats?.today??'';
    document.getElementById('statTotal').textContent=d.stats?.total??'';
    document.getElementById('qiHospital').textContent=d.hospital?.name||'';
    document.getElementById('qiAddress').textContent=d.hospital?.address||'';
    document.getElementById('qiCabinet').textContent=d.cabinet||'';
    document.getElementById('qiHours').textContent=d.work_hours||'';
    document.getElementById('qiDays').textContent=d.work_days||'';
    const today=new Date();
    document.getElementById('todayStr').textContent=today.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    document.getElementById('pageBody').style.display='';
    loadAppointments();
  }
  function setFilter(f){
    activeFilter=f;
    ['fToday','fWeek','fAll'].forEach(id=>document.getElementById(id).classList.remove('active'));
    document.getElementById(f==='today'?'fToday':f==='week'?'fWeek':'fAll').classList.add('active');
    loadAppointments();
  }
  function setStatus(s){
    activeStatus=s;
    ['sAll','sConfirmed','sCompleted','sCancelled'].forEach(id=>document.getElementById(id).classList.remove('active'));
    document.getElementById({''            :'sAll','confirmed':'sConfirmed','completed':'sCompleted','cancelled':'sCancelled'}[s]).classList.add('active');
    loadAppointments();
  }
  async function loadAppointments(){
    document.getElementById('tableCard').innerHTML='<div class="placeholder"><div class="icon"></div>Загрузка</div>';
    const p=new URLSearchParams({filter:activeFilter});
    if(activeStatus) p.set('status',activeStatus);
    const res=await apiFetch(`${API}/doctor/appointments/?${p}`);
    if(!res) return;
    renderTable(await res.json());
  }
  function renderTable(list){
    const card=document.getElementById('tableCard');
    if(!list.length){card.innerHTML='<div class="placeholder"><div class="icon"></div>Нет записей по выбранным фильтрам</div>';return;}
    const BD={confirmed:'<span class="badge b-confirmed">Подтверждена</span>',completed:'<span class="badge b-completed">Завершена</span>',cancelled:'<span class="badge b-cancelled">Отменена</span>'};
    const rows=list.map(a=>{
      const dt=new Date(a.datetime);
      const ds=dt.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'});
      const ts=dt.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
      const acts=a.status==='confirmed'?`<button class="act-btn act-done" onclick="doStatus(${a.id},'completed')"> Завершить</button><button class="act-btn act-cancel" onclick="doStatus(${a.id},'cancelled')"> Отменить</button>`:'<span style="color:var(--muted);font-size:13px;"></span>';
      return `<tr><td><b style="font-family:monospace">${a.code}</b></td><td>${a.patient_name}</td><td>${a.specialty}</td><td><b>${ds}</b> ${ts}</td><td style="text-align:center;font-weight:700">${a.queue_position}</td><td>${BD[a.status]||a.status}</td><td style="white-space:nowrap">${acts}</td></tr>`;
    }).join('');
    card.innerHTML=`<table><thead><tr><th>Код</th><th>Пациент</th><th>Специальность</th><th>Дата / Время</th><th style="text-align:center">Очередь</th><th>Статус</th><th>Действия</th></tr></thead><tbody>${rows}</tbody></table>`;
  }
  async function doStatus(id,status){
    const res=await apiFetch(`${API}/doctor/appointments/${id}/`,{method:'PATCH',body:JSON.stringify({status})});
    if(!res) return;
    const d=await res.json();
    if(d.ok){showToast(status==='completed'?' Завершена':' Отменена');loadAppointments();}
    else showToast('Ошибка: '+(d.error||'?'));
  }
  function showToast(msg){
    const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
    clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);
  }
  const aiHistory=[];
  function toggleAi(){
    const p=document.getElementById('aiPanel');p.classList.toggle('open');
    if(p.classList.contains('open')) document.getElementById('aiInput').focus();
  }
  async function sendAi(){
    const inp=document.getElementById('aiInput');const txt=inp.value.trim();if(!txt) return;
    inp.value='';appendAiMsg(txt,'user');const el=appendAiMsg('','bot');
    aiHistory.push({role:'user',content:txt});
    try{
      const r=await fetch(`${API}/ai/chat/`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:txt,history:aiHistory.slice(-10)})});
      const d=await r.json();const rep=d.reply||'Нет ответа.';
      el.textContent=rep;aiHistory.push({role:'assistant',content:rep});
    }catch{el.textContent='Ошибка подключения.';}
    const m=document.getElementById('aiMsgs');m.scrollTop=m.scrollHeight;
  }
  function appendAiMsg(txt,role){
    const m=document.getElementById('aiMsgs');const e=document.createElement('div');
    e.className='ai-msg '+role;e.textContent=txt;m.appendChild(e);m.scrollTop=m.scrollHeight;return e;
  }
  document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
